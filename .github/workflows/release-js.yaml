# Release + publish aspect_gazelle_js to the BCR, independently of the other
# modules (own js-v* version line). Thin trigger over release-module.yaml; to
# add another module, copy this file with a new tag prefix / root / name (and
# add a release_prep.sh case + .bcr/<module>/ templates).
name: Release (js)
on:
  push:
    tags:
      - 'js-v*.*.*'
permissions:
  id-token: write
  attestations: write
  contents: write
jobs:
  release:
    uses: ./.github/workflows/release-module.yaml
    with:
      tag_prefix: "js-v"
      module_root: "language/js"
      module_name: "aspect_gazelle_js"
    secrets:
      BCR_PUBLISH_TOKEN: ${{ secrets.BCR_PUBLISH_TOKEN }}
