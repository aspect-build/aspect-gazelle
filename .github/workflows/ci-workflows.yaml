name: CI - Aspect Workflows
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  buildifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Buildifier
        run: aspect buildifier --task-key=buildifier
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test
        run: aspect test --task-key=test -- //...
  gazelle-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle (common)
        working-directory: common
        run: aspect gazelle --task-key=gazelle-common
  test-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (common)
        working-directory: common
        run: aspect test --task-key=test-common -- //...
  gazelle-language-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle (language/js)
        working-directory: language/js
        run: aspect gazelle --task-key=gazelle-language-js
  test-language-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (language/js)
        working-directory: language/js
        run: aspect test --task-key=test-language-js -- //...
  # The js BCR smoke module (also driven by the bcr_test_module presubmit).
  # Mirrors that flow with raw bazel (no Aspect Workflows tasks): generate BUILD
  # files with @aspect_gazelle_js, then build and test the generated ts_project
  # targets. The generated output is not committed, so this is one job
  # (generate + test) rather than the usual gazelle-diff-check + test pair.
  test-language-js-e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-test-language-js-e2e-smoke
          repository-cache: true
          external-cache: true
      - name: JS BCR smoke test
        working-directory: language/js/e2e/smoke
        # smoke's .bazelversion symlink pins bazel for bazelisk (BCR's presubmit
        # overrides it via USE_BAZEL_VERSION, so it doesn't fight the version
        # matrix). --config=ci sets lockfile_mode=off (MODULE.bazel.lock isn't
        # committed; pnpm-lock.yaml is a separate, committed file).
        run: |
          bazel run --config=ci //:gazelle
          bazel test --config=ci //...
  gazelle-language-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle (language/kotlin)
        working-directory: language/kotlin
        run: aspect gazelle --task-key=gazelle-language-kotlin
  test-language-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (language/kotlin)
        working-directory: language/kotlin
        run: aspect test --task-key=test-language-kotlin -- //...
  gazelle-language-orion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle (language/orion)
        working-directory: language/orion
        run: aspect gazelle --task-key=gazelle-language-orion
  test-language-orion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (language/orion)
        working-directory: language/orion
        run: aspect test --task-key=test-language-orion -- //...
  gazelle-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle (runner)
        working-directory: runner
        run: aspect gazelle --task-key=gazelle-runner
  # Parallel run using //tools/gazelle:aspect_gazelle (the aspect_gazelle()
  # macro this repo ships) instead of the default //tools/gazelle:gazelle.
  # Both should produce the same BUILD generation result; any divergence is
  # a bug in the aspect_gazelle binary or macro.
  aspect-gazelle-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Aspect Gazelle (runner)
        working-directory: runner
        run: aspect gazelle --task-key=aspect-gazelle-runner --gazelle-target=//tools/gazelle:aspect_gazelle
  test-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (runner)
        working-directory: runner
        run: aspect test --task-key=test-runner -- //...
  # Simulate the release_prep.sh build so opt-only cross-compile failures surface
  # in CI. Runs concurrently with test-runner against prebuilt_platforms_build_test,
  # which is tagged "manual" and so excluded from test-runner's //... pattern.
  test-runner-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (runner, --config=release)
        working-directory: runner
        run: aspect test --task-key=test-runner-opt --bazel-flag=--config=release -- //:prebuilt_platforms_build_test
  gazelle-runner-e2e-bin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle (runner/e2e/bin)
        working-directory: runner/e2e/bin
        run: aspect gazelle --task-key=gazelle-runner-e2e-bin
  test-runner-e2e-bin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (runner/e2e/bin)
        working-directory: runner/e2e/bin
        run: aspect test --task-key=test-runner-e2e-bin -- //...
  test-treesitter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test (treesitter)
        working-directory: treesitter
        run: aspect test --task-key=test-treesitter -- //...
