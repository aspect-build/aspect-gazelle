name: Release
on:
  push:
    tags:
      - 'prebuilt-v*.*.*'
permissions:
  id-token: write
  attestations: write
  contents: write
jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: Check if pre-release
        id: check
        run: |
          TAG="${{ github.ref_name }}"
          # Strip tag prefix to get semver (e.g. "prebuilt-v1.2.3" -> "1.2.3")
          VERSION="${TAG#prebuilt-v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
  release:
    needs: tag
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.4.0
    with:
      prerelease: ${{ needs.tag.outputs.prerelease == 'true' }}
      tag_name: ${{ github.ref_name }}
      release_files: |
        artifacts/*
        aspect-gazelle-*.tar.gz
      # Bypass rerunning the tests - CI already covers this
      bazel_test_command: "true"
  publish:
    needs: [tag, release]
    if: ${{ needs.tag.outputs.prerelease == 'false' }}
    permissions:
      id-token: write
      attestations: write
      contents: write
    uses: ./.github/workflows/publish.yaml
    with:
      tag_name: ${{ github.ref_name }}
      tag_prefix: "prebuilt-v"
    secrets:
      BCR_PUBLISH_TOKEN: ${{ secrets.BCR_PUBLISH_TOKEN }}
