name: Release
# Requires a YYYY.WW base tag to exist on the target commit's history,
# created weekly by weekly_tag.yaml. The release tag is derived from
# that base tag via `git describe`.
on:
  workflow_dispatch:
  push:
    branches: ['test-release']
permissions:
  id-token: write
  attestations: write
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git describe
      - name: Compute version
        id: version
        run: |
          TAG=$(git describe --tags --long --match="[0-9][0-9][0-9][0-9].[0-9][0-9]" | sed -e 's/-/./;s/-g/+/')
          MODULE_VERSION="${TAG%%+*}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "module_version=$MODULE_VERSION" >> "$GITHUB_OUTPUT"
      - uses: bazel-contrib/setup-bazel@0.18.0
      - name: Build release artifacts
        working-directory: runner
        run: |
          mkdir assets
          for platform in linux_amd64 linux_arm64 darwin_arm64; do
            bazel run --run_under cp --platforms="@rules_go//go/toolchain:${platform}_cgo" //:gazelle_prebuilt_bin "$PWD/assets/aspect_gazelle-$platform"
          done
          shasum -a 256 assets/aspect_gazelle-* > assets/CHECKSUMS

          cat <<EOF > $GITHUB_WORKSPACE/release_notes.txt
          Add to your \`MODULE.bazel\`:

          \`\`\`starlark
          bazel_dep(name = "aspect_gazelle_prebuilt", version = "${{ steps.version.outputs.module_version }}")
          \`\`\`

          Then in your \`BUILD.bazel\`:

          \`\`\`starlark
          load("@aspect_gazelle_prebuilt//:def.bzl", "aspect_gazelle")

          aspect_gazelle(
              name = "gazelle",
              languages = ["js", "python"],
              extensions = ["//tools/gazelle:my_rule.star"],
          )
          \`\`\`
          EOF
      - name: Generate prebuilt/MODULE.bazel and def.bzl
        run: |
          python3 prebuilt/generate.py \
            prebuilt/MODULE.bazel.tmpl \
            "${{ steps.version.outputs.tag }}" \
            runner/assets/CHECKSUMS \
            runner/def.bzl
      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f prebuilt/MODULE.bazel prebuilt/def.bzl
          git diff --staged --quiet || git commit -m "chore: generate prebuilt/ for ${{ steps.version.outputs.tag }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'runner/assets/*'
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: runner/assets/*
          generate_release_notes: true
          body_path: release_notes.txt
          draft: true # https://github.com/softprops/action-gh-release/issues/653
      - name: Promote release to published
        run: gh release edit ${{ steps.version.outputs.tag }} --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-to-bcr:
    needs: release
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@main
    with:
      tag_name: ${{ needs.release.outputs.tag }}
      registry_fork: "aspect-build/bazel-central-registry"
      tag_prefix: ""
      draft: false
      attest: false
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
