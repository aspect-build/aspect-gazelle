name: Publish to BCR
on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
      module_roots:
        description: |
          Newline-separated module roots to publish. Required because this repo
          hosts several separately versioned modules: each release tag belongs
          to exactly one of them, so the publish must name which module(s) the
          tag's version applies to. This overrides the .bcr/config.yml
          moduleRoots index (which lists every module and must not be used as a
          bare-publish default for separately versioned modules).
        required: true
        type: string
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
      module_roots:
        required: true
        type: string
jobs:
  publish:
    # SLSA trusted-builder reusable workflows MUST be referenced by a semantic
    # version tag, not a commit SHA: slsa-verifier reads the builder ref from the
    # provenance and rejects a bare SHA ("unexpected ref type"), which breaks the
    # source.json attestation that BCR's presubmit verifies. Do not SHA-pin this.
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.3.0
    with:
      tag_name: ${{ inputs.tag_name }}
      tag_prefix: ${{ inputs.tag_prefix }}
      module_roots: ${{ inputs.module_roots }}
      registry_fork: "aspect-forks/bazel-central-registry"
      draft: false
      # Open the BCR PR from the caller workflow after the release is finalized,
      # so BCR's unauthenticated presubmit doesn't 404 on the still-draft archive.
      open_pull_request: false
    permissions:
      attestations: write
      contents: write
      id-token: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
