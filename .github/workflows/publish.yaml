name: Publish to BCR
on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
      templates_ref:
        description: |
          Git ref to read the .bcr templates (incl. config.yml moduleRoots) from,
          instead of the release tag. Used to publish a single module from a repo
          that hosts several: point at a ref whose .bcr/config.yml lists only that
          module. Empty falls back to tag_name.

          Interim mechanism for per-module publishing. Replace with a native
          module+version input once bazel-contrib/publish-to-bcr#368 lands.
        required: false
        default: ""
        type: string
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
      templates_ref:
        required: false
        default: ""
        type: string
jobs:
  publish:
    # SLSA trusted-builder reusable workflows MUST be referenced by a semantic
    # version tag, not a commit SHA: slsa-verifier reads the builder ref from the
    # provenance and rejects a bare SHA ("unexpected ref type"), which breaks the
    # source.json attestation that BCR's presubmit verifies. Do not SHA-pin this.
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.2.0
    with:
      tag_name: ${{ inputs.tag_name }}
      tag_prefix: ${{ inputs.tag_prefix }}
      # Empty string falls back to tag_name inside the reusable workflow.
      templates_ref: ${{ inputs.templates_ref }}
      registry_fork: "aspect-forks/bazel-central-registry"
      draft: false
      # Open the BCR PR from the caller workflow after the release is finalized,
      # so BCR's unauthenticated presubmit doesn't 404 on the still-draft archive.
      open_pull_request: false
    permissions:
      attestations: write
      contents: write
      id-token: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
